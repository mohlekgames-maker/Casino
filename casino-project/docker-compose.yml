version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: gamebred_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-gamebred_casino}
      MYSQL_USER: ${DB_USER:-casino_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-casino_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - casino_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gamebred_backend
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-casino_user}
      DB_PASSWORD: ${DB_PASSWORD:-casino_pass}
      DB_NAME: ${DB_NAME:-gamebred_casino}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      STARTING_BALANCE: ${STARTING_BALANCE:-1000}
    ports:
      - "5000:5000"
    networks:
      - casino_network

  # Frontend (served via nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
        VITE_DISCORD_INVITE: ${VITE_DISCORD_INVITE:-https://discord.gg/placeholder}
    container_name: gamebred_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    networks:
      - casino_network

volumes:
  mysql_data:

networks:
  casino_network:
    driver: bridge
